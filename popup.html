<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body        { width: 280px; padding: 14px; font-family: sans-serif; font-size: 13px; }
    label       { display: block; margin-bottom: 4px; font-weight: 500; }
    input,
    select      { width: 100%; box-sizing: border-box; padding: 6px 8px;
                  border: 1px solid #ccc; border-radius: 4px;
                  margin-bottom: 12px; font-size: 13px; }
    button      { width: 100%; padding: 8px; background: #4f46e5; color: #fff;
                  border: none; border-radius: 4px; cursor: pointer; font-size: 13px; }
    .stats      { display: flex; gap: 8px; margin-top: 12px; }
    .stat       { flex: 1; text-align: center; background: #f5f5f5;
                  border-radius: 4px; padding: 6px 4px; }
    .stat span  { display: block; font-size: 18px; font-weight: 600; }
    .stat small { color: #666; }
  </style>
</head>
<body>
  <label>Groq API key</label>
  <input type="password" id="groq-key" placeholder="gsk_...">

  <label>Show content about</label>
  <input type="text" id="preferred" placeholder="AI, cooking, jazz">

  <label>Block content about</label>
  <input type="text" id="blocked" placeholder="drama, celebrity">

  <label>Mode</label>
  <select id="mode">
    <option value="balanced">Balanced — block explicit, pass rest</option>
    <option value="strict">Strict — only show preferred topics</option>
    <option value="off">Off — passthrough</option>
  </select>

  <button id="save">Save preferences</button>

  <div class="stats">
    <div class="stat"><span id="s-shown">0</span><small>shown</small></div>
    <div class="stat"><span id="s-skipped">0</span><small>skipped</small></div>
    <div class="stat"><span id="s-blocked">0</span><small>blocked</small></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
